<!DOCTYPE html>
<html>
<head>
    <title>Simple Flask Shooter</title>
    <style>
        body { margin: 0; background: #222; color: white; text-align: center; font-family: sans-serif; }
        canvas { background: #000; display: block; margin: 20px auto; border: 2px solid #555; }
    </style>
</head>
<body>
    <h1>Space Shooter</h1>
    <p>Use <b>Left/Right Arrows</b> to move and <b>Space</b> to shoot.</p>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let player = { x: 180, y: 460, width: 40, height: 20, color: '#00ff00' };
        let bullets = [];
        let enemies = [];
        let score = 0;

        // Create an enemy every second
        setInterval(() => {
            enemies.push({ x: Math.random() * 360, y: 0, width: 30, height: 30, color: '#ff0000' });
        }, 1000);

        function update() {
            // Move bullets
            bullets.forEach((b, i) => {
                b.y -= 7;
                if (b.y < 0) bullets.splice(i, 1);
            });

            // Move enemies
            enemies.forEach((e, i) => {
                e.y += 2;
                if (e.y > canvas.height) {
                    enemies.splice(i, 1);
                    score -= 5; // Penalty for missing
                }
                
                // Collision Detection
                bullets.forEach((b, bi) => {
                    if (b.x < e.x + e.width && b.x + 5 > e.x && b.y < e.y + e.height && b.y + 10 > e.y) {
                        enemies.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                    }
                });
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw Bullets
            ctx.fillStyle = 'yellow';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 10));

            // Draw Enemies
            ctx.fillStyle = 'red';
            enemies.forEach(e => ctx.fillRect(e.x, e.y, e.width, e.height));

            // Draw Score
            ctx.fillStyle = 'white';
            ctx.fillText("Score: " + score, 10, 20);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' && player.x > 0) player.x -= 20;
            if (e.key === 'ArrowRight' && player.x < canvas.width - player.width) player.x += 20;
            if (e.key === ' ') bullets.push({ x: player.x + 18, y: player.y });
        });

        gameLoop();
    </script>
</body>
</html>
